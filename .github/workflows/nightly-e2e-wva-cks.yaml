name: Nightly - WVA E2E (CKS)

# Nightly regression test for WVA (Workload Variant Autoscaler) on CoreWeave
# Kubernetes (CKS). Deploys the workload-autoscaling guide stack via the
# consolidated kustomize reusable workflow and runs the WVA e2e test suite.
#
# Builds the WVA controller image from main before testing, since the helm
# chart on main may require features not yet in a tagged release image.

on:
  schedule:
    - cron: '30 7 * * *'  # 07:30 UTC daily (staggered from wide-ep-lws CKS at 07:00)
  workflow_dispatch:
    inputs:
      model_id:
        description: 'Model ID'
        required: false
        default: 'unsloth/Meta-Llama-3.1-8B'
      accelerator_type:
        description: 'Accelerator type (H100, H200, A100)'
        required: false
        default: 'H100'
      image_tag:
        description: 'WVA image tag (leave empty to build from main)'
        required: false
        default: ''
      request_rate:
        description: 'Request rate (req/s)'
        required: false
        default: '20'
      num_prompts:
        description: 'Number of prompts'
        required: false
        default: '3000'
      max_num_seqs:
        description: 'vLLM max batch size (lower = easier to saturate)'
        required: false
        default: '1'
      hpa_stabilization_seconds:
        description: 'HPA stabilization window in seconds'
        required: false
        default: '240'
      caller_ref:
        description: 'WVA repo ref to checkout for tests and image build (branch, tag, or SHA)'
        required: false
        default: 'main'
      skip_cleanup:
        description: 'Skip cleanup after tests (for debugging)'
        required: false
        default: 'false'

permissions:
  contents: read
  packages: write

concurrency:
  group: nightly-e2e-wva-cks
  cancel-in-progress: true

jobs:
  # Build the WVA controller image from main so the chart and binary match.
  # The chart on main may include flags (e.g. --config-file) that only exist
  # in the latest code, not in the last tagged release.
  build-wva-image:
    if: github.repository == 'llm-d/llm-d' && github.event.inputs.image_tag == ''
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.build.outputs.image_tag }}
    steps:
      - name: Checkout WVA source
        uses: actions/checkout@v6
        with:
          repository: llm-d/llm-d-workload-variant-autoscaler
          ref: ${{ github.event.inputs.caller_ref || 'main' }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USER }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push image
        id: build
        run: |
          SHA=$(git rev-parse --short=8 HEAD)
          IMAGE_TAG="nightly-${SHA}"
          FULL_IMAGE="ghcr.io/llm-d/llm-d-workload-variant-autoscaler:${IMAGE_TAG}"
          echo "Building WVA controller from main: $FULL_IMAGE"
          for attempt in 1 2 3; do
            echo "Build attempt $attempt/3"
            if make docker-build IMG="$FULL_IMAGE"; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Build failed after 3 attempts"
              exit 1
            fi
            echo "Build failed (likely transient registry error), retrying in 30s..."
            sleep 30
          done
          make docker-push IMG="$FULL_IMAGE"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

  nightly:
    needs: build-wva-image
    if: github.repository == 'llm-d/llm-d' && always() && (needs.build-wva-image.result == 'success' || needs.build-wva-image.result == 'skipped')
    uses: llm-d/llm-d-infra/.github/workflows/reusable-nightly-e2e-cks.yaml@main
    with:
      guide_name: workload-autoscaling
      namespace: llm-d-nightly-wva
      # Service name is truncated to 63 chars: ...-inferencepoo-epp (not ...-inferencepool-epp)
      gateway_host: 'workload-variant-autoscaler-inferencepoo-epp'
      custom_deploy_script: |
        # WVA kustomize builds target namespace llm-d-autoscaler (do not pass a conflicting kubectl -n).
        WVA_DEPLOY_NS=llm-d-autoscaler
        yq '.spec.template.spec.priorityClassName="nightly-gpu-critical"' -i guides/optimized-baseline/modelserver/gpu/vllm/patch-vllm.yaml
        yq '.spec.template.spec.volumes += {"name": "triton-cache", "emptyDir": {}}' -i guides/optimized-baseline/modelserver/gpu/vllm/patch-vllm.yaml
        yq '.spec.template.spec.containers[0].volumeMounts += {"mountPath": "/.triton", "name": "triton-cache"}' -i guides/optimized-baseline/modelserver/gpu/vllm/patch-vllm.yaml
        yq '.spec.replicas=2' -i guides/optimized-baseline/modelserver/gpu/vllm/patch-vllm.yaml
        kubectl apply -k guides/optimized-baseline/modelserver/gpu/vllm -n ${NAMESPACE}
        helm install workload-variant-autoscaler-inferencepool-standalone \
          oci://registry.k8s.io/gateway-api-inference-extension/charts/standalone \
          -f guides/recipes/scheduler/base.values.yaml \
          -f guides/optimized-baseline/scheduler/optimized-baseline.values.yaml \
          -n ${NAMESPACE} --version v1.5.0

        # Dedicated kube-prometheus-stack for WVA (TLS web :9090). Cluster may already have monitoring; this is namespaced.
        WVA_PROM_NS="${NAMESPACE}-monitoring"
        WVA_PROM_RELEASE=wva-nightly
        kubectl create namespace "${WVA_PROM_NS}" --dry-run=client -o yaml | kubectl apply -f -
        helm repo add prometheus-community https://prometheus-community.github.io/helm-charts 2>/dev/null || true
        helm repo update prometheus-community
        # Helm truncates names to 63 chars — CR/service name is NOT …kube-prometheus-stack-prometheus.
        PROM_RESOURCE="$(helm template "${WVA_PROM_RELEASE}" prometheus-community/kube-prometheus-stack \
          --namespace "${WVA_PROM_NS}" --version 62.7.0 \
          -f guides/workload-autoscaling/components/wva-nightly-prometheus-values.yaml 2>/dev/null \
          | awk '/^---$/ { p=0; next } /^kind: Prometheus$/ { p=1; next } p && /^  name:/ { print $2; exit }')"
        if [ -z "${PROM_RESOURCE}" ]; then
          echo "Failed to resolve Prometheus CR name from helm template"; exit 1
        fi
        PROM_SVC="${PROM_RESOURCE}.${WVA_PROM_NS}.svc.cluster.local"
        # X.509 CN is limited to 64 chars; use short CN + SAN (DNS SAN uses Helm-truncated service hostname).
        openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
          -subj "/CN=wva-nightly-prometheus" \
          -addext "subjectAltName=DNS:${PROM_SVC}" \
          -keyout "${RUNNER_TEMP:-/tmp}/wva-prom-tls.key" \
          -out "${RUNNER_TEMP:-/tmp}/wva-prom-tls.crt"
        kubectl create secret tls prometheus-web-tls \
          --cert="${RUNNER_TEMP:-/tmp}/wva-prom-tls.crt" --key="${RUNNER_TEMP:-/tmp}/wva-prom-tls.key" \
          -n "${WVA_PROM_NS}" --dry-run=client -o yaml | kubectl apply -f -
        helm upgrade --install "${WVA_PROM_RELEASE}" prometheus-community/kube-prometheus-stack \
          --version 62.7.0 --namespace "${WVA_PROM_NS}" --skip-crds \
          -f guides/workload-autoscaling/components/wva-nightly-prometheus-values.yaml
        kubectl wait --for=condition=Available prometheus "${PROM_RESOURCE}" \
          -n "${WVA_PROM_NS}" --timeout=600s || (
          echo "::group::WVA nightly Prometheus not Available"
          kubectl get prometheus -n "${WVA_PROM_NS}" -o wide || true
          kubectl describe prometheus "${PROM_RESOURCE}" -n "${WVA_PROM_NS}" || true
          kubectl get pods -n "${WVA_PROM_NS}" -o wide || true
          echo "::endgroup::"
          exit 1
        )

        # Kustomization validation dry run
        kubectl kustomize guides/workload-autoscaling/wva-config/platform/cks >/dev/null

        # apply WVA assets (ConfigMap PROMETHEUS_BASE_URL default matches llm-d-nightly-wva; align if NAMESPACE differs)
        kubectl apply -k guides/workload-autoscaling/wva-config/platform/cks
        PROM_URL="https://${PROM_RESOURCE}.${WVA_PROM_NS}.svc.cluster.local:9090"
        kubectl patch configmap workload-variant-autoscaler-wva-variantautoscaling-config \
          -n "${WVA_DEPLOY_NS}" --type merge \
          -p "$(jq -nc --arg u "${PROM_URL}" '{"data":{"PROMETHEUS_BASE_URL":$u}}')"

        # Base kustomize watches llm-d-optimized-baseline; nightly workloads live in ${NAMESPACE}.
        # Do not hardcode args[N]: upstream WVA chart order can change. Use one replica on CKS so
        # kubectl wait Available is not blocked waiting for a second controller pod on busy GPU nodes.
        PATCH_JSON=$(kubectl get deployment workload-variant-autoscaler-controller-manager -n "${WVA_DEPLOY_NS}" -o json | jq --arg ns "${NAMESPACE}" '
          (.spec.template.spec.containers | map(.name == "manager") | index(true)) as $ci |
          (.spec.template.spec.containers[$ci].args | to_entries | map(select(.value | startswith("--watch-namespace="))) | .[0].key) as $ai |
          if ($ci | type) != "number" then error("manager container not found")
          elif ($ai | type) != "number" then error("watch-namespace arg not found")
          else
            [
              {"op":"replace","path":"/spec/replicas","value":1},
              {"op":"replace","path":("/spec/template/spec/containers/" + ($ci|tostring) + "/args/" + ($ai|tostring)), "value":("--watch-namespace=" + $ns)}
            ]
          end')
        kubectl patch deployment workload-variant-autoscaler-controller-manager \
          -n "${WVA_DEPLOY_NS}" --type=json -p "${PATCH_JSON}"

        # Validate WVA controller is ready, then apply autoscaling resources
        kubectl wait deployment/workload-variant-autoscaler-controller-manager \
          -n "${WVA_DEPLOY_NS}" --for=condition=Available --timeout=900s || (
          echo "::group::WVA controller not Available (CKS debug)"
          kubectl describe deployment workload-variant-autoscaler-controller-manager -n "${WVA_DEPLOY_NS}" || true
          kubectl get pods -n "${WVA_DEPLOY_NS}" -l 'app.kubernetes.io/name=workload-variant-autoscaler,control-plane=controller-manager' -o wide || true
          kubectl logs -n "${WVA_DEPLOY_NS}" -l 'app.kubernetes.io/name=workload-variant-autoscaler,control-plane=controller-manager' --tail=400 --all-containers=true --prefix=true || true
          echo "::endgroup::"
          exit 1
        )
        kubectl apply -k guides/workload-autoscaling/optimized-baseline-autoscaling -n "${NAMESPACE}"
        kubectl get variantautoscaling,hpa -n "${NAMESPACE}"
      accelerator_type: H100
      required_gpus: 2
      recommended_gpus: 4
      pod_wait_timeout: '30m'
      pod_readiness_delay: 180
      image_override: 'ghcr.io/llm-d/llm-d-cuda-dev:latest'
      allow_gpu_preemption: true
      skip_cleanup: ${{ github.event.inputs.skip_cleanup == 'true' }}
    secrets: inherit
