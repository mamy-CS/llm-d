# CoreWeave/CKS-style clusters may default-deny pod egress. Without an egress policy, the WVA manager
# can fail Prometheus startup validation with: dial tcp ... connect: operation not permitted.
#
# We select only the controller pods and allow all egress. Narrow rules (443/DNS/9090 only) still
# failed on some CNIs (EPERM or flakes); allowing egress only for these pods preserves isolation vs
# widening the whole namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: workload-variant-autoscaler-controller-egress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: workload-variant-autoscaler
      control-plane: controller-manager
  policyTypes:
    - Egress
  egress:
    - {}
