# Minimal kube-prometheus-stack for WVA CKS nightlies (${NAMESPACE}-monitoring).
# Prometheus web listens with TLS (requires Secret prometheus-web-tls in the namespace before helm upgrade).
#
# Helm release name is kube-prometheus-stack 
# so the Service is kube-prometheus-stack-prometheus.<ns>.svc.cluster.local without 63-char truncation.
# PROMETHEUS_BASE_URL is set in wva-config/platform/cks and patched in nightly-e2e-wva-cks if NAMESPACE differs.
alertmanager:
  enabled: false
grafana:
  enabled: false
nodeExporter:
  enabled: false
defaultRules:
  create: false
kubeStateMetrics:
  enabled: false
prometheusOperator:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
prometheus:
  service:
    type: ClusterIP
  prometheusSpec:
    retention: 1d
    resources:
      requests:
        cpu: 250m
        memory: 1Gi
      limits:
        cpu: "2"
        memory: 3Gi
    scrapeInterval: 30s
    evaluationInterval: 30s
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorSelector: {}
    podMonitorNamespaceSelector: {}
    # Do not set prometheusSpec.containers probe overrides here: the operator strategic-merges them
    # with defaults and Kubernetes rejects two probe handlers (e.g. httpGet + tcpSocket).
    web:
      tlsConfig:
        cert:
          secret:
            name: prometheus-web-tls
            key: tls.crt
        keySecret:
          name: prometheus-web-tls
          key: tls.key
